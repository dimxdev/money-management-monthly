<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <!-- Status bar ikut warna background tema (di-update juga saat toggle tema di app) -->
    <meta name="theme-color" content="#0B1026" />
    <script>
      ;(function () {
        var light = localStorage.getItem('theme') === 'light'
        if (!light) document.documentElement.classList.add('dark')
        document
          .querySelector('meta[name="theme-color"]')
          .setAttribute('content', light ? '#EAF7FA' : '#0B1026')
      })()
    </script>
    <link rel="icon" type="image/x-icon" href="/money-tracker-favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Pencatatan keuangan pribadi bulanan — offline, tanpa iklan." />
    <title>Money Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
